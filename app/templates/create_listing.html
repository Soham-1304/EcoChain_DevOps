{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-3">List Carbon Credits for Sale</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Credit Type</label>
                        <select class="form-select" name="credit_type" required>
                            <option value="Renewable Energy">Renewable Energy</option>
                            <option value="Forestry / REDD+">Forestry / REDD+</option>
                            <option value="Methane Capture">Methane Capture</option>
                            <option value="Energy Efficiency">Energy Efficiency</option>
                            <option value="Direct Air Capture">Direct Air Capture</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity (tCO2e)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" name="quantity" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price per Credit (USD)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" name="price" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Create Listing</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
