version: "3.9"

# ---------------------------------------------------------------------------
# EcoChain Exchange - Full local DevOps stack
#
# Brings up:
#   - ecochain-app   : Flask carbon credit exchange app
#   - postgres       : application database
#   - prometheus     : metrics scraping
#   - grafana        : metrics dashboards
#   - vault          : secret management (dev mode)
#   - elasticsearch  : log storage
#   - logstash       : log processing pipeline
#   - kibana         : log visualization
#
# Usage:
#   docker compose up -d --build
#   docker compose ps
#   docker compose logs -f ecochain-app
#   docker compose down -v
# ---------------------------------------------------------------------------

services:
  ecochain-app:
    build: ./app
    container_name: ecochain-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ecochain:ecochain_pass@postgres:5432/ecochain
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    ports:
      - "5050:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecochain-net

  postgres:
    image: postgres:16-alpine
    container_name: ecochain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecochain
      POSTGRES_PASSWORD: ecochain_pass
      POSTGRES_DB: ecochain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecochain"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecochain-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ecochain-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ecochain-net

  grafana:
    image: grafana/grafana:latest
    container_name: ecochain-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecochain-net

  vault:
    image: hashicorp/vault:latest
    container_name: ecochain-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - ecochain-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ecochain-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ecochain-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: ecochain-logstash
    restart: unless-stopped
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - ecochain-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: ecochain-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ecochain-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: ecochain-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./logging/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - ecochain-net

volumes:
  pgdata:
  grafana-data:
  esdata:

networks:
  ecochain-net:
    driver: bridge
