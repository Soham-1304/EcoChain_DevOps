# ---------------------------------------------------------------------------
# EcoChain Exchange application Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecochain-app
  namespace: ecochain
  labels:
    app: ecochain-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecochain-app
  template:
    metadata:
      labels:
        app: ecochain-app
    spec:
      containers:
        - name: ecochain-app
          image: 636704811196.dkr.ecr.eu-north-1.amazonaws.com/ecochain-app
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ecochain-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecochain-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ecochain-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
