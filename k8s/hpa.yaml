# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler - automatically scales the app under heavy
# trading load (e.g., end-of-quarter compliance reporting periods)
# Requires the metrics-server addon to be installed in the cluster
# ---------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecochain-app-hpa
  namespace: ecochain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecochain-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
