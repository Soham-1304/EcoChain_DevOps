# ---------------------------------------------------------------------------
# Logstash pipeline - receives logs from Filebeat, parses, and ships to
# Elasticsearch for visualization in Kibana
# ---------------------------------------------------------------------------

input {
  beats {
    port => 5044
  }
}

filter {
  # Gunicorn / Flask access logs look like:
  # 172.18.0.1 - - [14/Jun/2026:10:15:32 +0000] "GET /marketplace HTTP/1.1" 200 4521
  grok {
    match => {
      "message" => "%{IPORHOST:client_ip} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:http_method} %{URIPATHPARAM:request_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:response_code} %{NUMBER:bytes_sent}"
    }
    tag_on_failure => ["_grokparsefailure_ecochain"]
  }

  date {
    match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
    target => "@timestamp"
  }

  mutate {
    add_field => { "application" => "ecochain-exchange" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecochain-logs-%{+YYYY.MM.dd}"
  }

  # Useful while debugging the pipeline
  # stdout { codec => rubydebug }
}
